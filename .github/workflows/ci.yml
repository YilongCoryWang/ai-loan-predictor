name: CI - Loan Prediction API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install all required dependencies including test dependencies
        pip install fastapi uvicorn pytest joblib numpy pandas scikit-learn python-dotenv
        
        # If requirements.txt exists, install from it
        if [ -f requirements.txt ]; then 
          pip install -r requirements.txt
        fi
    
    - name: Create mock directories and files
      run: |
        # Create static directory if it doesn't exist
        mkdir -p static
        touch static/index.html
        
        # Create empty model and scaler files to prevent loading errors during tests
        touch loan_model.pkl loan_scaler.pkl
    
    - name: Run unit tests
      run: |
        echo "Running unit tests..."
        python -m unittest discover -v
    
    - name: Verify test coverage
      run: |
        echo "Test execution completed. Check the logs above for detailed results."

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Lint with pylint
      run: |
        pylint --disable=all --enable=unused-import,unused-variable,unused-argument,missing-docstring main.py